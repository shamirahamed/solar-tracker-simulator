<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0a1118"/>
  <!-- Ground line -->
  <line x1="80" y1="360" x2="432" y2="360" stroke="#1e2736" stroke-width="6"/>
  <!-- Post -->
  <rect x="244" y="260" width="24" height="110" rx="6" fill="#1e3a5f"/>
  <!-- Solar panel (tilted ~20deg) -->
  <g transform="translate(256,255) rotate(-20)">
    <rect x="-110" y="-18" width="220" height="36" rx="6" fill="#0ea5e9"/>
    <!-- Panel grid lines -->
    <line x1="-37" y1="-18" x2="-37" y2="18" stroke="#0c4a6e" stroke-width="2"/>
    <line x1="37" y1="-18" x2="37" y2="18" stroke="#0c4a6e" stroke-width="2"/>
    <line x1="-110" y1="0" x2="110" y2="0" stroke="#0c4a6e" stroke-width="2"/>
  </g>
  <!-- Sun -->
  <circle cx="370" cy="130" r="42" fill="#f59e0b"/>
  <!-- Sun rays -->
  <g stroke="#f59e0b" stroke-width="5" stroke-linecap="round">
    <line x1="370" y1="72" x2="370" y2="58"/>
    <line x1="370" y1="188" x2="370" y2="202"/>
    <line x1="312" y1="130" x2="298" y2="130"/>
    <line x1="428" y1="130" x2="442" y2="130"/>
    <line x1="329" y1="89" x2="319" y2="79"/>
    <line x1="411" y1="171" x2="421" y2="181"/>
    <line x1="411" y1="89" x2="421" y2="79"/>
    <line x1="329" y1="171" x2="319" y2="181"/>
  </g>
  <!-- Accent arc (tracker sweep indicator) -->
  <path d="M 180 360 A 80 80 0 0 1 256 280" stroke="#00c853" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="256" cy="280" r="6" fill="#00c853"/>
</svg>
