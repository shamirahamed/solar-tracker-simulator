<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solar Tracker Simulator</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <h1>Solar Tracker Simulator</h1>

    <div class="card">
      <h2>Simulation Inputs</h2>
      <form id="simulation-form">
        <div class="grid">
          <div>
            <label for="latitude">Latitude</label>
            <input type="number" step="any" id="latitude" value="53.3498" required />
          </div>

          <div>
            <label for="longitude">Longitude</label>
            <input type="number" step="any" id="longitude" value="-6.2603" required />
          </div>

          <div>
            <label for="timezone">Timezone</label>
            <input type="text" id="timezone" value="Europe/Dublin" required />
          </div>

          <div>
            <label for="date">Date</label>
            <input type="date" id="date" value="2026-03-09" required />
          </div>

          <div>
            <label for="max_angle">Max Angle</label>
            <input type="number" step="any" id="max_angle" value="60" required />
          </div>

          <div>
            <label for="gcr">GCR</label>
            <input type="number" step="any" id="gcr" value="0.35" required />
          </div>

          <div class="checkbox-row">
            <label for="backtracking">Backtracking</label>
            <input type="checkbox" id="backtracking" checked />
          </div>
        </div>

        <div class="button-row">
          <button type="submit">Run Simulation</button>
          <button type="button" id="download-csv">Download CSV</button>
        </div>
      </form>
    </div>

    <div class="card">
      <h2>Tracker Angle Chart</h2>
      <canvas id="anglesChart"></canvas>
    </div>

    <div class="card">
      <h2>Response Preview</h2>
      <pre id="preview">Run a simulation to view output...</pre>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
